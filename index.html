<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Trip Hub 🚀</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1 class="floating">Si Parte!</h1>
                <div id="sync-status" title="Sincronizzazione attiva" style="width: 12px; height: 12px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981;"></div>
            </div>
            <p id="countdown">Caricamento...</p>
        </header>

        <div class="roadmap-container">
            <div class="roadmap-stop">
                <div class="stop-marker marker-blue"></div>
                <div class="card">
                    <h2>Mettiti in rotta</h2>
                    <div class="nav-grid">
                        <button onclick="naviga('google')" class="btn btn-white">Google Maps</button>
                        <button onclick="naviga('waze')" class="btn btn-blue">Waze</button>
                    </div>
                </div>
            </div>

            <div class="roadmap-stop">
                <div class="stop-marker marker-orange"></div>
                <div class="card">
                    <h2>Cassa Carburante (Real-time)</h2>
                    <div class="input-group">
                        <label>Litri Benzina:</label>
                        <input type="number" id="input-litri" placeholder="0" oninput="salvaCassaCloud()">
                    </div>
                    <div class="input-group">
                        <label>Prezzo al litro (€):</label>
                        <input type="number" id="input-prezzo" placeholder="1.85" oninput="salvaCassaCloud()">
                    </div>
                    <div class="input-group">
                        <label>Pedaggi (€):</label>
                        <input type="number" id="input-tolls" placeholder="0" oninput="salvaCassaCloud()">
                    </div>
                    <div class="result-box">
                        <span>Quota a testa:</span>
                        <span>€<span id="result">0</span></span>
                    </div>
                </div>
            </div>

            <div class="roadmap-stop">
                <div class="stop-marker marker-green"></div>
                <div class="card">
                    <h2>Checklist di Gruppo</h2>
                    <div id="checkList"></div>
                </div>
            </div>

            <div class="roadmap-stop">
                <div class="stop-marker marker-pink"></div>
                <div class="card">
                    <h2>Album Foto Condiviso</h2>
                    <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px;">
                        Carica le foto su Google Drive per non perdere qualità!
                    </p>
                    <a href="https://drive.google.com/drive/folders/1FXGf0U_7R9q8O_CMwtONk5-lacH7a-bT?usp=drive_link" target="_blank" class="btn btn-blue" style="text-decoration: none; text-align: center; display: block;">
                        📂 Apri Cartella Drive
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
